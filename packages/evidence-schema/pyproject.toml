[project]
# Distribution name is namespaced for PyPI (ADR-0003); the import name stays
# `evidence_schema` so no consumer code changes.
name = "voltry-evidence-schema"
version = "1.2.1"
description = "Signed GPU evidence bundle schema: canonical JSON (RFC 8785) with ECDSA P-384 signatures"
requires-python = ">=3.10"
license = "Apache-2.0"
readme = "README.md"
authors = [{ name = "Voltry" }]
keywords = ["gpu", "evidence", "provenance", "canonical-json", "rfc8785", "ecdsa"]
classifiers = [
  "Development Status :: 4 - Beta",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Typing :: Typed",
  "Operating System :: OS Independent",
]
# Deliberately dependency-light: this contract is shared by the agent, the backend,
# and the engine. Lower bounds here; exact versions pinned by uv.lock (committed).
dependencies = [
  "pydantic>=2.11,<3",
  "cryptography>=44,<50",
  "rfc8785>=0.1.4,<0.2",
]

[project.urls]
Source = "https://github.com/Voltry-tech/voltry-probe"
Issues = "https://github.com/Voltry-tech/voltry-probe/issues"
Changelog = "https://github.com/Voltry-tech/voltry-probe/blob/main/packages/evidence-schema/CHANGELOG.md"

[project.scripts]
# Convenience: emit the JSON Schema for cross-language consumers.
evidence-schema-jsonschema = "evidence_schema.jsonschema:main"

# Published on PyPI with a 3.10 floor (ADR-0003): lint for the floor, not the
# workspace default. `extend` keeps the root select/per-file-ignores rules.
[tool.ruff]
extend = "../../pyproject.toml"
target-version = "py310"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["evidence_schema"]

# Keep internal working notes and local caches out of the sdist.
[tool.hatch.build.targets.sdist]
exclude = [".hypothesis", ".pytest_cache", ".ruff_cache", ".coverage"]

# --- Local test + coverage config (pytest runs from this directory in CI) ---
[tool.pytest.ini_options]
addopts = "-q --import-mode=importlib"
testpaths = ["tests"]
filterwarnings = ["error"]

[tool.coverage.run]
branch = true
source = ["evidence_schema"]

[tool.coverage.report]
# The cryptographic / invariant-bearing core must be fully covered: an untested branch
# in canonicalize or sign/verify is exactly where a byte-stability or verification bug
# would hide. Enforced, not just measured: the package's coverage run fails below 100%.
# `version`/`__init__` are trivial; demo + jsonschema are exercised by tests.
# `exclude_also` ADDS to coverage's defaults (which already honor `# pragma: no cover`).
exclude_also = ["if TYPE_CHECKING:", "raise NotImplementedError"]
fail_under = 100
