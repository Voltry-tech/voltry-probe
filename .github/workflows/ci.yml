name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync --all-packages --dev --locked --python ${{ matrix.python }}
      - name: Lint and format
        run: |
          uv run ruff check .
          uv run black --check .
      - name: evidence-schema tests
        run: uv run --package voltry-evidence-schema pytest packages/evidence-schema -q
      - name: voltry-probe tests
        run: uv run --package voltry-probe pytest packages/voltry-probe -q
