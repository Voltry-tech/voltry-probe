# Virtual uv workspace root: this repo carries the two published packages and is
# not itself a distributable package.
[tool.uv.workspace]
members = ["packages/*"]

[tool.uv]
dev-dependencies = [
  "pytest>=8.2",
  "pytest-cov>=5.0",
  "hypothesis>=6.100",
  "ruff>=0.5",
  "black>=24.4",
  "httpx>=0.27",
]

# Shared lint/format config for both packages (matches what the releases were
# built and tested under).
[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "ANN", "S", "C4", "SIM"]
ignore = ["ANN401"]

[tool.ruff.lint.per-file-ignores]
# Tests: asserts are expected (S101); annotations not required (ANN); test "secrets" are
# fixtures not credentials (S105/S106); subprocess in tests uses sys.executable + literal
# args, no shell (S603/S607).
"**/tests/**" = ["S101", "ANN", "S105", "S106", "S603", "S607"]
# Typer CLIs intentionally call Option()/Argument() in argument defaults, the
# framework-idiomatic pattern that B008 flags.
"**/cli.py" = ["B008"]

[tool.black]
line-length = 100
target-version = ["py310", "py311", "py312"]

[tool.pytest.ini_options]
addopts = "-q --import-mode=importlib"
testpaths = ["packages/*/tests"]

[tool.coverage.run]
branch = true
omit = ["*/tests/*"]
